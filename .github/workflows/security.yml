name: Security

on:
  push:
  pull_request:
  schedule:
    - cron: "17 9 * * 1"

permissions:
  contents: read

jobs:
  publication-policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Run repository publication policy
        run: bash scripts/security-check.sh
      - name: Scan Git history for secrets
        uses: gitleaks/gitleaks-action@v2
